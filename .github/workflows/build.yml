name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: tmux-agents-mon-linux-x86_64
            target: x86_64-unknown-linux-musl
            binary: target/x86_64-unknown-linux-musl/release/agents-mon
          - runner: ubuntu-24.04-arm
            artifact: tmux-agents-mon-linux-aarch64
            target: aarch64-unknown-linux-musl
            binary: target/aarch64-unknown-linux-musl/release/agents-mon
          - runner: macos-15-intel
            artifact: tmux-agents-mon-macos-x86_64
            target: x86_64-apple-darwin
            binary: target/x86_64-apple-darwin/release/agents-mon
          - runner: macos-15
            artifact: tmux-agents-mon-macos-aarch64
            target: aarch64-apple-darwin
            binary: target/aarch64-apple-darwin/release/agents-mon

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install static Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
          rustup target add "${{ matrix.target }}"

      - name: Test
        run: |
          cargo test --locked
          cargo build --release --locked --target "${{ matrix.target }}"
          AGENTS_MON_BIN="${{ matrix.binary }}" ./tests/run.sh

      - name: Package plugin
        shell: bash
        run: |
          package="${{ matrix.artifact }}"
          mkdir -p "dist/$package/target/release"
          git archive HEAD | tar -x -C "dist/$package"
          cp "${{ matrix.binary }}" "dist/$package/target/release/agents-mon"
          tar -czf "dist/$package.tar.gz" -C dist "$package"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/${{ matrix.artifact }}.tar.gz
          archive: false
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish ${{ github.ref_name }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        shell: bash
        run: |
          count="$(find dist -maxdepth 1 -name 'tmux-agents-mon-*.tar.gz' | wc -l)"
          test "$count" -eq 4
          cd dist
          sha256sum ./*.tar.gz > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.tar.gz dist/SHA256SUMS \
            --verify-tag \
            --generate-notes \
            --title "tmux-agents-mon $GITHUB_REF_NAME"
