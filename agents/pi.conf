# Pi — rules ported from herdr src/detect/manifests/pi.toml (working-only upstream too)
AGENT_BINS="pi"
AGENT_PATH_HINTS="pi-coding-agent"

WORKING_SCREEN='Working\.\.\.'

CHECK_ORDER="ws"

TITLE_STRIP='^π - '

# unnamed sessions carry no title subject — pull session name / first user
# message from the newest session file for the pane's cwd
# ponytail: newest-file heuristic; wrong pick if two pi sessions share a cwd
SUBJECT_CMD='f=$(ls -t "$HOME/.pi/agent/sessions/-${path//\//-}--"/*.jsonl 2>/dev/null | head -n 1)
  [ -n "$f" ] && {
    grep "\"type\":\"session_info\"" "$f" | tail -n 1 | sed -E "s/.*\"name\":\"([^\"]*)\".*/\1/"
    grep -m 1 "\"role\":\"user\"" "$f" | sed -E "s/.*\"text\":\"([^\"]*)\".*/\1/"
  } | grep -m 1 .'
