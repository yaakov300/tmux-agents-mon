# Oh My Pi — fork of pi, launched as `omp`. Same UI/session files as pi.conf.
AGENT_BINS="omp"
AGENT_PATH_HINTS="oh-my-pi omp"

# omp busy status: "⠏ Checking… ⟦esc⟧" footer (fork style), or upstream's
# "Running… (esc to cancel)" — both only render while a task runs
WORKING_SCREEN='⟦esc⟧|\(esc to cancel\)'
BLOCKED_SCREEN='Enter select.*Esc cancel'

CHECK_ORDER="bs ws"

TITLE_STRIP='^π: '

# shares pi's session store (~/.pi/agent/sessions). newest-first, first
# file yielding a session name / first user message wins.
# ponytail: newest-with-subject heuristic; wrong pick if two sessions share a cwd
SUBJECT_CMD='for f in $(ls -t "$HOME/.pi/agent/sessions/-${path//\//-}--"/*.jsonl 2>/dev/null); do
    s=$({
      grep "\"type\":\"session_info\"" "$f" | tail -n 1 | sed -nE "s/.*\"name\":\"([^\"]*)\".*/\1/p"
      grep -m 1 "\"role\":\"user\"" "$f" | sed -nE "s/.*\"(text|content)\":\"([^\"]*)\".*/\2/p"
    } | grep -m 1 .)
    [ -n "$s" ] && { printf "%s\n" "$s"; break; }
  done'
